<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script>
        const params = new URLSearchParams(window.location.search);
        let nomeApp = "Gestão RH";
        if (params.get('ponto')) nomeApp = "FH Ponto";
        if (params.get('id')) nomeApp = "Assinar Vale";
        document.write('<title>' + nomeApp + '</title>');
    </script>
    
    <link rel="icon" href="https://i.postimg.cc/zDRJMSTn/69420f5a-5b80-457e-8146-00485162d7f2.jpg">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/zDRJMSTn/69420f5a-5b80-457e-8146-00485162d7f2.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gestão RH">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* Estilização Premium FH Construções */
        :root { 
            --navy: #1a2a43; 
            --gold: #d4a017; 
            --light: #f4f7f6; 
            --white: #ffffff; 
            --shadow: 0 10px 30px rgba(26, 42, 67, 0.15);
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--light); 
            margin: 0; 
            padding: 15px; 
            color: #333; 
        }

        .main-card { 
            background: var(--white); 
            padding: 30px 20px; 
            border-radius: 25px; 
            box-shadow: var(--shadow); 
            max-width: 500px; 
            margin: auto; 
            border-top: 8px solid var(--navy); 
            min-height: 500px;
        }

        .header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .logo { max-width: 150px; height: auto; border-radius: 12px; }
        .title { color: var(--navy); font-weight: 700; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }

        /* Sistema de Abas (Tabs) */
        .tabs-container { 
            display: flex; 
            border-bottom: 2px solid #eee; 
            margin-bottom: 30px; 
            overflow-x: auto; 
            scrollbar-width: none;
        }
        .tab-btn { 
            flex: 1; 
            text-align: center; 
            padding: 15px 5px; 
            cursor: pointer; 
            font-weight: 700; 
            color: #bbb; 
            font-size: 12px; 
            transition: 0.3s; 
            white-space: nowrap;
        }
        .tab-btn.active { 
            color: var(--navy); 
            border-bottom: 4px solid var(--gold); 
        }
        
        .section-content { display: none; animation: fadeIn 0.4s ease; }
        .section-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Formulários */
        label { display: block; margin-top: 18px; font-weight: 600; font-size: 13px; color: var(--navy); text-transform: uppercase; }
        input, select, textarea { 
            width: 100%; 
            padding: 14px; 
            margin-top: 8px; 
            border: 2px solid #e0e6ed; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 15px; 
            font-family: 'Poppins', sans-serif; 
            transition: 0.3s;
        }
        input:focus { border-color: var(--gold); outline: none; background: #fff; }

        /* Botões de Ação */
        .btn { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 15px; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 25px;
            text-transform: uppercase;
        }
        .btn-navy { background: var(--navy); color: white; }
        .btn-navy:active { transform: scale(0.98); }
        .btn-gold { background: var(--gold); color: var(--navy); }
        
        /* Lista de Itens */
        .item-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px; 
            border-bottom: 1px solid #f0f0f0; 
            background: #fafcff; 
            border-radius: 12px; 
            margin-bottom: 10px;
        }
        .badge-ponto { 
            padding: 15px; 
            border-radius: 15px; 
            background: #fff; 
            border-left: 6px solid var(--gold); 
            margin-top: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Telas Específicas */
        #signature-box { 
            border: 2px solid #e0e6ed; 
            background: #fff; 
            width: 100%; 
            height: 200px; 
            border-radius: 15px; 
            margin-top: 15px; 
            touch-action: none; 
        }

        /* Renderização de PDF */
        #pdf-hidden-area { 
            position: absolute; 
            left: -9999px; 
            top: 0; 
            background: white; 
            width: 800px; 
            padding: 50px; 
            color: black; 
        }
    </style>
</head>
<body>

<div class="main-card" id="view-patrao" style="display: none;">
    <div class="header">
        <img src="https://i.postimg.cc/zDRJMSTn/69420f5a-5b80-457e-8146-00485162d7f2.jpg" class="logo">
        <div class="title">Painel Administrativo FH</div>
    </div>

    <div class="tabs-container">
        <div class="tab-btn active" id="t1" onclick="navegar('aba-equipe')">1. EQUIPE</div>
        <div class="tab-btn" id="t2" onclick="navegar('aba-criar-vale')">2. CRIAR VALE</div>
        <div class="tab-btn" id="t3" onclick="navegar('aba-arquivo')">3. ARQUIVO</div>
        <div class="tab-btn" id="t4" onclick="navegar('aba-ponto-gps')">4. PONTO GPS</div>
    </div>

    <div id="aba-equipe" class="section-content active">
        <label>Nome do Funcionário</label>
        <input type="text" id="add-nome" placeholder="Ex: João da Silva">
        <label>CPF (Login do Usuário)</label>
        <input type="number" id="add-cpf" placeholder="Apenas números">
        <label>WhatsApp (com DDD)</label>
        <input type="number" id="add-tel" placeholder="Ex: 43999999999">
        <button class="btn btn-gold" id="btn-cadastrar-func">SALVAR FUNCIONÁRIO</button>
        <div id="render-equipe" style="margin-top:30px;"></div>
    </div>

    <div id="aba-criar-vale" class="section-content">
        <label>Selecione o Funcionário</label>
        <select id="sel-func-vale" class="select-universal"></select>
        <label>Valor (R$)</label>
        <input type="number" id="val-valor" placeholder="0.00">
        <label>Descrição do Pagamento</label>
        <textarea id="val-desc" rows="3" placeholder="Ex: Adiantamento da Quinzena"></textarea>
        <button class="btn btn-navy" id="btn-gerar-vale-zap">GERAR E ENVIAR WHATSAPP</button>
    </div>

    <div id="aba-arquivo" class="section-content">
        <label>Ver Recibos de:</label>
        <select id="sel-func-arq" class="select-universal"></select>
        <button class="btn btn-navy" id="btn-buscar-recibos">BUSCAR RECIBOS ASSINADOS</button>
        <div id="render-arquivo" style="margin-top:20px;"></div>
    </div>

    <div id="aba-ponto-gps" class="section-content">
        <button class="btn btn-gold" id="btn-copy-ponto-link" style="margin-bottom:20px;">COPIAR LINK DO RELÓGIO DE PONTO</button>
        <label>Histórico do Funcionário:</label>
        <select id="sel-func-ponto" class="select-universal"></select>
        <button class="btn btn-navy" id="btn-buscar-ponto">VER REGISTROS NO MAPA</button>
        <hr style="margin:25px 0; border:0; border-top:1px solid #eee;">
        <button id="btn-pdf-mensal" class="btn btn-gold" style="display:none; background:#cf9a0e; color:white;">📄 GERAR RELATÓRIO PDF MENSAL</button>
        <div id="render-ponto" style="margin-top:15px;"></div>
    </div>
</div>

<div class="main-card" id="view-login" style="display: none;">
    <div class="header">
        <img src="https://i.postimg.cc/zDRJMSTn/69420f5a-5b80-457e-8146-00485162d7f2.jpg" class="logo">
        <div class="title">Login - Relógio de Ponto</div>
    </div>
    <label>Digite seu CPF</label>
    <input type="number" id="log-cpf" placeholder="Somente números">
    <label>Sua Senha</label>
    <input type="password" id="log-senha" placeholder="Sua senha">
    <p style="font-size:11px; color:#888; margin-top:10px; text-align:center;">Primeiro acesso? A senha que você escolher agora será gravada.</p>
    <button class="btn btn-navy" id="btn-logar">ENTRAR NO SISTEMA</button>
</div>

<div class="main-card" id="view-relogio" style="display: none;">
    <div class="header">
        <div class="title">Olá, <span id="user-nome"></span></div>
    </div>
    <label>Em qual Obra / Local você está?</label>
    <input type="text" id="ponto-obra-atual" placeholder="Ex: Obra Centro">
    <button class="btn" style="background:#28a745; color:white;" id="btn-entrada">🟢 REGISTRAR ENTRADA</button>
    <button class="btn" style="background:#d9534f; color:white;" id="btn-saida">🔴 REGISTRAR SAÍDA</button>
    <button onclick="localStorage.clear(); location.reload();" style="width:100%; border:none; background:none; color:#999; margin-top:50px; font-size:12px; cursor:pointer;">Sair do Perfil</button>
</div>

<div class="main-card" id="view-assinatura" style="display: none;">
    <div class="header"><div class="title">Assinar Recibo Digital</div></div>
    <div id="corpo-texto-vale" style="font-size:14px; line-height:1.7; text-align:justify; margin-bottom:20px; background:#f9f9f9; padding:20px; border-radius:15px; border-left:5px solid var(--navy);"></div>
    <label style="text-align:center;">Assine seu nome abaixo:</label>
    <canvas id="signature-box"></canvas>
    <button class="btn btn-gold" id="btn-salvar-assinatura">CONFIRMAR E ENVIAR</button>
</div>

<div id="pdf-hidden-area">
    <div style="text-align:center; border-bottom:4px solid #1a2a43; padding-bottom:20px; margin-bottom:30px;">
        <img src="https://i.postimg.cc/zDRJMSTn/69420f5a-5b80-457e-8146-00485162d7f2.jpg" style="max-height:80px;">
        <h1 style="color:#1a2a43; margin:10px 0 0 0; font-size:30px;">FH CONSTRUÇÕES CIVIS LTDA</h1>
        <p id="pdf-doc-title" style="font-size:18px; font-weight:bold;"></p>
    </div>
    <div id="pdf-doc-body" style="font-size:20px; line-height:2; margin-bottom:50px; text-align:justify;"></div>
    <div id="pdf-sig-block" style="margin-top:80px; text-align:center; display:none;">
        <img id="pdf-sig-img" src="" style="max-height:140px; border-bottom:1px solid #000; margin-bottom:10px;"><br>
        <b id="pdf-sig-name"></b>
    </div>
    <table id="pdf-table-ponto" style="width:100%; border-collapse:collapse; margin-top:20px; display:none;">
        <thead><tr style="background:#1a2a43; color:white;"><th style="padding:12px; border:1px solid #ddd;">DATA</th><th style="padding:12px; border:1px solid #ddd;">HORA</th><th style="padding:12px; border:1px solid #ddd;">TIPO</th><th style="padding:12px; border:1px solid #ddd;">LOCAL DA OBRA</th></tr></thead>
        <tbody id="pdf-tbody-ponto"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, deleteDoc, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBKlQXW4JRrPxv_NcoG8Jq2-7KZZALrTuU",
        authDomain: "fhconstrucoes-f36d0.firebaseapp.com",
        projectId: "fhconstrucoes-f36d0",
        storageBucket: "fhconstrucoes-f36d0.firebasestorage.app",
        messagingSenderId: "621427159155",
        appId: "1:621427159155:web:85a4975d35a24513d6ba06"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const urlParams = new URLSearchParams(window.location.search);
    const idValeUrl = urlParams.get('id');
    const modoPontoUrl = urlParams.get('ponto');

    window.equipeGlobal = {};

    // --- CARREGAMENTO INICIAL ---
    document.addEventListener('DOMContentLoaded', async () => {
        if(idValeUrl) {
            document.getElementById('view-assinatura').style.display = 'block';
            await carregarDadosVale(idValeUrl);
        } else if(modoPontoUrl) {
            const logadoId = localStorage.getItem('fId');
            if(logadoId) {
                document.getElementById('view-relogio').style.display = 'block';
                document.getElementById('user-nome').innerText = localStorage.getItem('fNome');
            } else {
                document.getElementById('view-login').style.display = 'block';
            }
        } else {
            document.getElementById('view-patrao').style.display = 'block';
            await carregarPainelPatrao();
        }
        configurarEventosBotao();
    });

    // --- SISTEMA DE NAVEGAÇÃO ---
    window.navegar = function(idSecao) {
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
        
        const map = {'aba-equipe':'t1', 'aba-criar-vale':'t2', 'aba-arquivo':'t3', 'aba-ponto-gps':'t4'};
        document.getElementById(map[idSecao]).classList.add('active');
        document.getElementById(idSecao).classList.add('active');
    };

    // --- VINCULAÇÃO DE BOTÕES (FORÇADA) ---
    function configurarEventosBotao() {
        const clicar = (id, fn) => { const el = document.getElementById(id); if(el) el.onclick = fn; };

        clicar('btn-cadastrar-func', acaoCadastrar);
        clicar('btn-gerar-vale-zap', acaoGerarVale);
        clicar('btn-buscar-recibos', acaoListarRecibos);
        clicar('btn-buscar-ponto', acaoBuscarPonto);
        clicar('btn-pdf-mensal', acaoGerarPdfPonto);
        clicar('btn-logar', acaoLogin);
        clicar('btn-entrada', () => acaoRegistrarPonto('Entrada'));
        clicar('btn-saida', () => acaoRegistrarPonto('Saída'));
        clicar('btn-salvar-assinatura', acaoSalvarAssinatura);
        clicar('btn-copy-ponto-link', () => {
            navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?ponto=true");
            Swal.fire('Copiado!', 'Link pronto para enviar aos funcionários.', 'success');
        });
    }

    // --- FUNÇÕES: PAINEL ADMINISTRATIVO ---

    async function carregarPainelPatrao() {
        const snap = await getDocs(query(collection(db, "funcionarios"), orderBy("nome")));
        let htmlLista = ''; 
        let htmlOpcoes = '<option value="">Selecione o Funcionário...</option>';
        window.equipeGlobal = {};

        snap.forEach(d => {
            const f = d.data();
            window.equipeGlobal[d.id] = f;
            htmlOpcoes += `<option value="${d.id}">${f.nome}</option>`;
            htmlLista += `
                <div class="item-row">
                    <span><b>${f.nome}</b><br><small>CPF: ${f.cpf}</small></span>
                    <button onclick="removerF('${d.id}')" style="background:#ff4d4d; color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer; font-weight:bold;">EXCLUIR</button>
                </div>`;
        });
        document.getElementById('render-equipe').innerHTML = htmlLista || '<p style="text-align:center; color:#888;">Nenhum funcionário cadastrado.</p>';
        document.querySelectorAll('.select-universal').forEach(s => s.innerHTML = htmlOpcoes);
    }

    async function acaoCadastrar() {
        const n = document.getElementById('add-nome').value.trim();
        const c = document.getElementById('add-cpf').value.trim();
        const t = document.getElementById('add-tel').value.trim();
        if(!n || !c) return Swal.fire('Erro', 'Nome e CPF são obrigatórios!', 'error');
        
        Swal.fire({title: 'Salvando...', allowOutsideClick: false}); Swal.showLoading();
        await addDoc(collection(db, "funcionarios"), { nome: n, cpf: c, tel: t, senha: "" });
        Swal.fire('Cadastrado!', n + ' agora faz parte da equipe.', 'success');
        document.getElementById('add-nome').value = ''; document.getElementById('add-cpf').value = '';
        await carregarPainelPatrao();
    }

    async function acaoGerarVale() {
        const id = document.getElementById('sel-func-vale').value;
        const valor = document.getElementById('val-valor').value;
        const desc = document.getElementById('val-desc').value || "pagamento de serviços";
        if(!id || !valor) return Swal.fire('Atenção', 'Selecione o funcionário e o valor.', 'warning');

        const func = window.equipeGlobal[id];
        const textoComp = `Eu, ${func.nome}, portador do CPF ${func.cpf}, declaro que recebi da empresa FH Construções Civis LTDA a importância de R$ ${valor}, referente a ${desc}.`;
        
        const docRef = await addDoc(collection(db, "vales_sistema"), { 
            fId: id, nome: func.nome, texto: textoComp, valor: valor, status: "pendente", tel: func.tel 
        });
        
        const linkVale = window.location.origin + window.location.pathname + "?id=" + docRef.id;
        window.open(`https://api.whatsapp.com/send?phone=55${func.tel}&text=Olá ${func.nome}, assine seu recibo digital aqui: ${linkVale}`);
    }

    async function acaoListarRecibos() {
        const id = document.getElementById('sel-func-arq').value;
        if(!id) return Swal.fire('Erro', 'Selecione um funcionário.', 'error');
        const snap = await getDocs(query(collection(db, "vales_sistema"), where("fId", "==", id), where("status", "==", "assinado")));
        let html = ''; 
        window.recibosLocal = {};
        snap.forEach(d => {
            const v = d.data(); window.recibosLocal[d.id] = v;
            html += `
                <div class="badge-ponto">
                    <b>Recibo de R$ ${v.valor}</b><br>
                    <button class="btn btn-navy" style="padding:10px; margin-top:10px; font-size:12px;" onclick="baixarPdfVale('${d.id}')">📄 BAIXAR PDF ASSINADO</button>
                </div>`;
        });
        document.getElementById('render-arquivo').innerHTML = html || '<p style="text-align:center;">Nenhum recibo assinado encontrado.</p>';
    }

    window.baixarPdfVale = async (id) => {
        const v = window.recibosLocal[id];
        document.getElementById('pdf-doc-title').innerText = "RECIBO DE PAGAMENTO DIGITAL";
        document.getElementById('pdf-doc-body').innerText = v.texto;
        document.getElementById('pdf-sig-img').src = v.assinatura;
        document.getElementById('pdf-sig-name').innerText = v.nome;
        document.getElementById('pdf-sig-block').style.display = 'block';
        document.getElementById('pdf-table-ponto').style.display = 'none';

        Swal.fire({title: 'Gerando PDF...', allowOutsideClick: false}); Swal.showLoading();
        const element = document.getElementById('pdf-hidden-area');
        const canvas = await html2canvas(element, { scale: 2 });
        const docPdf = new jspdf.jsPDF('p', 'mm', 'a4');
        docPdf.addImage(canvas.toDataURL('image/jpeg'), 'JPEG', 0, 0, 210, (canvas.height * 210) / canvas.width);
        docPdf.save(`Recibo_FH_${v.nome}.pdf`);
        Swal.fire('Sucesso!', 'PDF baixado com sucesso.', 'success');
    };

    async function acaoBuscarPonto() {
        const id = document.getElementById('sel-func-ponto').value;
        if(!id) return Swal.fire('Erro', 'Selecione o funcionário.', 'error');
        const snap = await getDocs(query(collection(db, "ponto_registros"), where("fId", "==", id)));
        let html = ''; 
        window.pontosLocal = [];
        snap.forEach(d => {
            const p = d.data(); window.pontosLocal.push(p);
            html += `
                <div class="badge-ponto" style="border-left-color:${p.tipo=='Entrada'?'#28a745':'#d9534f'}">
                    <b>${p.tipo}</b> - ${p.data} às ${p.hora}<br>Obra: ${p.obra}<br>
                    <button class="btn btn-navy" style="background:#4285F4; padding:8px; font-size:11px;" onclick="window.open('http://googleusercontent.com/maps.google.com/7{p.lat},${p.lng}')">📍 VER LOCAL NO GOOGLE MAPS</button>
                </div>`;
        });
        document.getElementById('render-ponto').innerHTML = html || '<p style="text-align:center;">Sem registros de ponto.</p>';
        document.getElementById('btn-pdf-mensal').style.display = snap.empty ? 'none' : 'block';
    }

    async function acaoGerarPdfPonto() {
        const id = document.getElementById('sel-func-ponto').value;
        const f = window.equipeGlobal[id];
        document.getElementById('pdf-doc-title').innerText = "RELATÓRIO DE PONTO ELETRÔNICO";
        document.getElementById('pdf-doc-body').innerHTML = `<b>FUNCIONÁRIO:</b> ${f.nome}<br><b>CPF:</b> ${f.cpf}<br><b>DATA DE GERAÇÃO:</b> ${new Date().toLocaleDateString()}`;
        document.getElementById('pdf-sig-block').style.display = 'none';
        document.getElementById('pdf-table-ponto').style.display = 'table';
        
        let linhas = '';
        window.pontosLocal.sort((a,b)=>b.ts - a.ts).forEach(p => {
            linhas += `<tr><td style="padding:10px; border:1px solid #ddd;">${p.data}</td><td style="padding:10px; border:1px solid #ddd;">${p.hora}</td><td style="padding:10px; border:1px solid #ddd;">${p.tipo}</td><td style="padding:10px; border:1px solid #ddd;">${p.obra}</td></tr>`;
        });
        document.getElementById('pdf-tbody-ponto').innerHTML = linhas;

        const canvas = await html2canvas(document.getElementById('pdf-hidden-area'), { scale: 2 });
        const docPdf = new jspdf.jsPDF('p', 'mm', 'a4');
        docPdf.addImage(canvas.toDataURL('image/jpeg'), 'JPEG', 0, 0, 210, (canvas.height * 210) / canvas.width);
        docPdf.save(`Folha_Ponto_${f.nome}.pdf`);
    }

    // --- FUNÇÕES: ÁREA DO FUNCIONÁRIO ---

    async function acaoLogin() {
        const cpf = document.getElementById('log-cpf').value.trim();
        const senha = document.getElementById('log-senha').value.trim();
        if(!cpf || !senha) return Swal.fire('Erro', 'Preencha CPF e Senha.', 'error');

        Swal.fire({title: 'Entrando...', allowOutsideClick: false}); Swal.showLoading();
        const snap = await getDocs(query(collection(db, "funcionarios"), where("cpf", "==", cpf)));
        
        if(snap.empty) return Swal.fire('Erro', 'CPF não cadastrado no RH.', 'error');
        const docF = snap.docs; 
        const fData = docF.data();

        if(!fData.senha) {
            await updateDoc(doc(db, "funcionarios", docF.id), {senha: senha});
            logarSessao(docF.id, fData.nome);
        } else if(fData.senha === senha) {
            logarSessao(docF.id, fData.nome);
        } else {
            Swal.fire('Erro', 'Senha incorreta.', 'error');
        }
    }
    function logarSessao(id, nome) { localStorage.setItem('fId', id); localStorage.setItem('fNome', nome); location.reload(); }

    async function acaoRegistrarPonto(tipo) {
        const obra = document.getElementById('ponto-obra-atual').value.trim();
        if(!obra) return Swal.fire('Atenção', 'Digite o nome da obra para registrar.', 'warning');
        
        Swal.fire({title: 'Obtendo GPS...', allowOutsideClick: false}); Swal.showLoading();
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await addDoc(collection(db, "ponto_registros"), {
                fId: localStorage.getItem('fId'), nome: localStorage.getItem('fNome'),
                tipo: tipo, obra: obra, lat: pos.coords.latitude, lng: pos.coords.longitude,
                data: new Date().toLocaleDateString('pt-BR'), hora: new Date().toLocaleTimeString('pt-BR'), ts: Date.now()
            });
            Swal.fire('Sucesso!', tipo + ' confirmada às ' + new Date().toLocaleTimeString(), 'success');
            document.getElementById('ponto-obra-atual').value = '';
        }, () => Swal.fire('Erro', 'Ligue o GPS do seu celular.', 'error'), {enableHighAccuracy: true});
    }

    // --- LOGICA DE ASSINATURA ---
    const canvasObj = document.getElementById('signature-box');
    const contexto = canvasObj?.getContext('2d');
    let riscando = false;
    if(canvasObj) {
        canvasObj.width = canvasObj.offsetWidth; canvasObj.height = canvasObj.offsetHeight;
        const pos = (e) => { const r = canvasObj.getBoundingClientRect(); return { x: (e.touches ? e.touches.clientX : e.clientX) - r.left, y: (e.touches ? e.touches.clientY : e.clientY) - r.top }};
        canvasObj.onmousedown = canvasObj.ontouchstart = (e) => { riscando = true; contexto.beginPath(); const p = pos(e); contexto.moveTo(p.x, p.y); contexto.lineWidth=3; contexto.strokeStyle="#1a2a43"; };
        canvasObj.onmousemove = canvasObj.ontouchmove = (e) => { if(!riscando) return; const p = pos(e); contexto.lineTo(p.x, p.y); contexto.stroke(); };
        window.onmouseup = window.ontouchend = () => riscando = false;
    }

    async function carregarDadosVale(id) {
        const d = await getDoc(doc(db, "vales_sistema", id));
        if(d.exists()) {
            if(d.data().status === 'assinado') { document.body.innerHTML = "<h2 style='text-align:center; margin-top:100px;'>O documento já foi assinado e enviado.</h2>"; return; }
            document.getElementById('corpo-texto-vale').innerText = d.data().texto;
        }
    }

    async function acaoSalvarAssinatura() {
        Swal.fire({title: 'Processando Assinatura...', allowOutsideClick: false}); Swal.showLoading();
        await updateDoc(doc(db, "vales_sistema", idValeUrl), { assinatura: canvasObj.toDataURL(), status: "assinado" });
        Swal.fire('Assinado!', 'Recibo enviado ao RH com sucesso.', 'success').then(() => location.href = "https://google.com");
    }

    window.removerF = async (id) => { if(confirm('Deseja realmente excluir este funcionário?')) { await deleteDoc(doc(db, "funcionarios", id)); carregarPainelPatrao(); } };
</script>
