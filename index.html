<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script>
        // Define o título do site antes de carregar qualquer outra coisa
        const urlParams = new URLSearchParams(window.location.search);
        let titulo = "Gestão RH - FH";
        if (urlParams.get('ponto')) titulo = "Relógio de Ponto";
        if (urlParams.get('id')) titulo = "Assinar Recibo";
        document.write('<title>' + titulo + '</title>');
    </script>
    
    <link rel="icon" href="https://i.postimg.cc/zDRJMSTn/69420f5a-5b80-457e-8146-00485162d7f2.jpg">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/zDRJMSTn/69420f5a-5b80-457e-8146-00485162d7f2.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FH Gestão">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* CSS COMPLETO - DESIGN FH CONSTRUÇÕES */
        :root { 
            --azul: #1a2a43; 
            --ouro: #d4a017; 
            --fundo: #f4f7f6; 
            --branco: #ffffff; 
            --texto: #333333;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--fundo); 
            margin: 0; 
            padding: 10px; 
            color: var(--texto); 
            -webkit-tap-highlight-color: transparent;
        }

        .container { 
            background: var(--branco); 
            padding: 25px 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            max-width: 480px; 
            margin: 10px auto; 
            border-top: 6px solid var(--azul); 
            position: relative;
        }

        /* Topo com Logo */
        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .logo { max-width: 140px; height: auto; border-radius: 10px; }
        .sub-titulo { color: var(--azul); font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        /* Estilo das 4 Abas Originais */
        .tabs { 
            display: flex; 
            border-bottom: 2px solid #eee; 
            margin-bottom: 25px; 
            overflow-x: auto; 
            scrollbar-width: none; 
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-item { 
            flex: 1; 
            text-align: center; 
            padding: 12px 5px; 
            cursor: pointer; 
            font-weight: 700; 
            color: #aaa; 
            font-size: 11px; 
            white-space: nowrap; 
            transition: 0.3s;
        }
        .tab-item.active { 
            color: var(--azul); 
            border-bottom: 4px solid var(--ouro); 
        }

        /* Seções de Conteúdo */
        .secao { display: none; animation: aparecer 0.3s ease; }
        .secao.active { display: block; }
        @keyframes aparecer { from { opacity: 0; } to { opacity: 1; } }

        /* Campos de Entrada */
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 12px; color: var(--azul); text-transform: uppercase; }
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px; 
            border: 2px solid #e0e6ed; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 15px; 
            font-family: 'Poppins'; 
        }
        input:focus { border-color: var(--ouro); outline: none; }

        /* Botões */
        .btn { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 10px; 
            font-weight: 700; 
            font-size: 15px; 
            cursor: pointer; 
            margin-top: 15px; 
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-azul { background: var(--azul); color: white; }
        .btn-ouro { background: var(--ouro); color: var(--azul); }
        .btn-verde { background: #28a745; color: white; }
        .btn-vermelho { background: #d9534f; color: white; }

        /* Listas e Cards */
        .item-lista { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px; 
            border-bottom: 1px solid #eee; 
            background: #fafcff; 
            border-radius: 8px; 
            margin-bottom: 8px; 
        }
        .card-resultado { 
            border: 1px solid #e0e6ed; 
            padding: 15px; 
            border-radius: 12px; 
            margin-top: 10px; 
            background: #fff; 
            border-left: 5px solid var(--ouro); 
        }

        /* Assinatura */
        canvas { 
            border: 2px solid #e0e6ed; 
            background: #fff; 
            width: 100%; 
            height: 180px; 
            border-radius: 15px; 
            margin-top: 10px; 
            touch-action: none; 
        }

        /* Área de Exportação (Escondida) */
        #area-export-pdf { 
            position: absolute; 
            left: -9999px; 
            top: 0; 
            background: white; 
            width: 800px; 
            padding: 40px; 
            color: black; 
        }
    </style>
</head>
<body>

<div class="container" id="tela-patrao" style="display: none;">
    <div class="header">
        <img src="https://i.postimg.cc/zDRJMSTn/69420f5a-5b80-457e-8146-00485162d7f2.jpg" class="logo">
        <div class="sub-titulo">Painel de Gestão FH</div>
    </div>

    <div class="tabs">
        <div class="tab-item active" id="tab1" onclick="abrirAba('aba-equipe')">1. EQUIPE</div>
        <div class="tab-item" id="tab2" onclick="abrirAba('aba-vales')">2. CRIAR VALE</div>
        <div class="tab-item" id="tab3" onclick="abrirAba('aba-arquivo')">3. ARQUIVO</div>
        <div class="tab-item" id="tab4" onclick="abrirAba('aba-ponto')">4. PONTO GPS</div>
    </div>

    <div id="aba-equipe" class="secao active">
        <label>Nome Completo</label>
        <input type="text" id="eq-nome" placeholder="Ex: João Silva">
        <label>CPF (Login)</label>
        <input type="number" id="eq-cpf" placeholder="Somente números">
        <label>WhatsApp</label>
        <input type="number" id="eq-tel" placeholder="DDD + Número">
        <button class="btn btn-ouro" id="btn-salvar-func">CADASTRAR FUNCIONÁRIO</button>
        <div id="lista-equipe-corpo" style="margin-top:20px;">Carregando...</div>
    </div>

    <div id="aba-vales" class="secao">
        <label>Funcionário</label>
        <select id="vl-select-func" class="select-universal"></select>
        <label>Valor R$</label>
        <input type="number" id="vl-valor" placeholder="0,00">
        <label>Descrição</label>
        <textarea id="vl-desc" rows="2" placeholder="Referente a..."></textarea>
        <button class="btn btn-azul" id="btn-enviar-vale">GERAR LINK WHATSAPP</button>
    </div>

    <div id="aba-arquivo" class="secao">
        <label>Ver Recibos de:</label>
        <select id="arq-select-func" class="select-universal"></select>
        <button class="btn btn-azul" id="btn-buscar-arquivo">BUSCAR VALES ASSINADOS</button>
        <div id="lista-arquivo-corpo" style="margin-top:20px;"></div>
    </div>

    <div id="aba-ponto" class="secao">
        <button class="btn btn-ouro" id="btn-copiar-link-ponto">COPIAR LINK DO PONTO</button>
        <label>Histórico de:</label>
        <select id="pt-select-func" class="select-universal"></select>
        <button class="btn btn-azul" id="btn-buscar-ponto">VER REGISTROS GPS</button>
        <button id="btn-gerar-relatorio-ponto" class="btn btn-ouro" style="display:none; background:#b88a12; color:white;">📄 GERAR RELATÓRIO PDF</button>
        <div id="lista-ponto-corpo" style="margin-top:20px;"></div>
    </div>
</div>

<div class="container" id="tela-login" style="display: none;">
    <div class="header">
        <img src="https://i.postimg.cc/zDRJMSTn/69420f5a-5b80-457e-8146-00485162d7f2.jpg" class="logo">
        <div class="sub-titulo">Acesso ao Ponto</div>
    </div>
    <label>CPF</label>
    <input type="number" id="log-cpf" placeholder="Apenas números">
    <label>Senha</label>
    <input type="password" id="log-senha" placeholder="Sua senha">
    <p style="font-size:11px; color:#888; text-align:center; margin-top:10px;">No primeiro acesso, a senha digitada será salva.</p>
    <button class="btn btn-azul" id="btn-efetuar-login">ENTRAR NO SISTEMA</button>
</div>

<div class="container" id="tela-relogio" style="display: none;">
    <div class="header">
        <div class="sub-titulo">Olá, <span id="nome-exibir"></span></div>
    </div>
    <label>Nome da Obra / Localização</label>
    <input type="text" id="ponto-obra" placeholder="Ex: Obra Centro">
    <button class="btn btn-verde" id="btn-registrar-entrada">🟢 REGISTRAR ENTRADA</button>
    <button class="btn btn-vermelho" id="btn-registrar-saida">🔴 REGISTRAR SAÍDA</button>
    <button onclick="localStorage.clear(); location.reload();" style="width:100%; border:none; background:none; color:#999; margin-top:40px; font-size:11px; cursor:pointer;">Sair da Conta</button>
</div>

<div class="container" id="tela-assinatura" style="display: none;">
    <div class="header"><div class="sub-titulo">Assinar Recibo</div></div>
    <div id="recibo-texto-corpo" style="font-size:14px; line-height:1.6; text-align:justify; background:#f9f9f9; padding:15px; border-radius:10px; margin-bottom:15px;"></div>
    <canvas id="pincel-assinatura"></canvas>
    <button class="btn btn-ouro" id="btn-confirmar-assinatura">FINALIZAR E ENVIAR</button>
</div>

<div id="area-export-pdf">
    <div style="text-align:center; border-bottom:4px solid #1a2a43; padding-bottom:20px; margin-bottom:30px;">
        <img src="https://i.postimg.cc/zDRJMSTn/69420f5a-5b80-457e-8146-00485162d7f2.jpg" style="max-height:80px;">
        <h1 style="color:#1a2a43; margin:10px 0;">FH CONSTRUÇÕES CIVIS LTDA</h1>
        <p id="pdf-header-tipo" style="font-weight:bold; font-size:18px;"></p>
    </div>
    <div id="pdf-texto-principal" style="font-size:20px; line-height:1.8; text-align:justify; margin-bottom:40px;"></div>
    <div id="pdf-bloco-assinatura" style="margin-top:80px; text-align:center; display:none;">
        <img id="pdf-img-assinatura" src="" style="max-height:130px; border-bottom:1px solid #000; margin-bottom:10px;"><br>
        <b id="pdf-nome-func"></b>
    </div>
    <table id="pdf-tabela-ponto" style="width:100%; border-collapse:collapse; display:none;">
        <thead><tr style="background:#1a2a43; color:white;"><th style="padding:10px; border:1px solid #ddd;">DATA</th><th style="padding:10px; border:1px solid #ddd;">HORA</th><th style="padding:10px; border:1px solid #ddd;">TIPO</th><th style="padding:10px; border:1px solid #ddd;">OBRA</th></tr></thead>
        <tbody id="pdf-corpo-tabela"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, deleteDoc, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBKlQXW4JRrPxv_NcoG8Jq2-7KZZALrTuU",
        authDomain: "fhconstrucoes-f36d0.firebaseapp.com",
        projectId: "fhconstrucoes-f36d0",
        storageBucket: "fhconstrucoes-f36d0.firebasestorage.app",
        messagingSenderId: "621427159155",
        appId: "1:621427159155:web:85a4975d35a24513d6ba06"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const params = new URLSearchParams(window.location.search);
    const v_id = params.get('id');
    const is_p = params.get('ponto');

    window.cache_f = {};

    // --- CONTROLE DE ABAS (Síncrono para não travar) ---
    window.abrirAba = function(idAba) {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('active'));
        
        const mapTabs = {'aba-equipe':'tab1', 'aba-vales':'tab2', 'aba-arquivo':'tab3', 'aba-ponto':'tab4'};
        document.getElementById(mapTabs[idAba]).classList.add('active');
        document.getElementById(idAba).classList.add('active');
    };

    // --- INICIALIZAÇÃO DO SISTEMA ---
    window.addEventListener('load', async () => {
        if (v_id) {
            document.getElementById('tela-assinatura').style.display = 'block';
            await loadRecibo(v_id);
        } else if (is_p) {
            if (localStorage.getItem('fId')) {
                document.getElementById('tela-relogio').style.display = 'block';
                document.getElementById('nome-exibir').innerText = localStorage.getItem('fNome');
            } else {
                document.getElementById('tela-login').style.display = 'block';
            }
        } else {
            document.getElementById('tela-patrao').style.display = 'block';
            await carregarDadosPatrao();
        }
        conectarBotoes();
    });

    function conectarBotoes() {
        const clique = (id, fn) => { const el = document.getElementById(id); if(el) el.onclick = fn; };

        clique('btn-salvar-func', acaoSalvarFuncionario);
        clique('btn-enviar-vale', acaoEnviarVale);
        clique('btn-buscar-arquivo', acaoListarArquivo);
        clique('btn-buscar-ponto', acaoBuscarPonto);
        clique('btn-gerar-relatorio-ponto', acaoPdfPontoMensal);
        clique('btn-efetuar-login', acaoLoginFunc);
        clique('btn-registrar-entrada', () => acaoPonto('Entrada'));
        clique('btn-registrar-saida', () => acaoPonto('Saída'));
        clique('btn-confirmar-assinatura', acaoAssinarFinal);
        clique('btn-copiar-link-ponto', () => {
            navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?ponto=true");
            Swal.fire('Copiado!', 'Link enviado para o WhatsApp da equipe.', 'success');
        });
    }

    // --- FUNÇÕES DO PATRÃO ---

    async function carregarDadosPatrao() {
        const snap = await getDocs(query(collection(db, "funcionarios"), orderBy("nome")));
        let hLista = ''; let hOpts = '<option value="">Selecione o Funcionário...</option>';
        window.cache_f = {};

        snap.forEach(d => {
            const f = d.data();
            window.cache_f[d.id] = f;
            hOpts += `<option value="${d.id}">${f.nome}</option>`;
            hLista += `<div class="item-lista"><span><b>${f.nome}</b><br><small>CPF: ${f.cpf}</small></span><button onclick="deletarFunc('${d.id}')" style="background:red; color:white; border:none; padding:5px 8px; border-radius:5px; cursor:pointer;">EXCLUIR</button></div>`;
        });
        document.getElementById('lista-equipe-corpo').innerHTML = hLista || 'Nenhum funcionário.';
        document.querySelectorAll('.select-universal').forEach(s => s.innerHTML = hOpts);
    }

    async function acaoSalvarFuncionario() {
        const n = document.getElementById('eq-nome').value.trim();
        const c = document.getElementById('eq-cpf').value.trim();
        const t = document.getElementById('eq-tel').value.trim();
        if(!n || !c) return Swal.fire('Erro', 'Preencha Nome e CPF!', 'error');
        
        await addDoc(collection(db, "funcionarios"), { nome: n, cpf: c, tel: t, senha: "" });
        Swal.fire('Cadastrado!', n + ' foi adicionado.', 'success');
        document.getElementById('eq-nome').value = ''; document.getElementById('eq-cpf').value = '';
        await carregarDadosPatrao();
    }

    async function acaoEnviarVale() {
        const id = document.getElementById('vl-select-func').value;
        const v = document.getElementById('vl-valor').value;
        const d = document.getElementById('vl-desc').value || "pagamento";
        if(!id || !v) return Swal.fire('Atenção', 'Selecione o funcionário e valor.', 'warning');

        const f = window.cache_f[id];
        const txt = `Eu, ${f.nome}, CPF ${f.cpf}, confirmo o recebimento de R$ ${v} da FH Construções Civis LTDA ref. a ${d}.`;
        const docRef = await addDoc(collection(db, "vales_sistema"), { fId: id, nome: f.nome, texto: txt, valor: v, status: "pendente", tel: f.tel });
        
        const link = window.location.origin + window.location.pathname + "?id=" + docRef.id;
        window.open(`https://api.whatsapp.com/send?phone=55${f.tel}&text=Assine seu recibo aqui: ${link}`);
    }

    async function acaoListarArquivo() {
        const id = document.getElementById('arq-select-func').value;
        const snap = await getDocs(query(collection(db, "vales_sistema"), where("fId", "==", id), where("status", "==", "assinado")));
        let h = ''; window.cache_recibos = {};
        snap.forEach(d => {
            const v = d.data(); window.cache_recibos[d.id] = v;
            h += `<div class="card-resultado"><b>Recibo R$ ${v.valor}</b><br><button class="btn btn-azul" style="padding:8px; font-size:12px;" onclick="baixarPdfVale('${d.id}')">BAIXAR PDF ASSINADO</button></div>`;
        });
        document.getElementById('lista-arquivo-corpo').innerHTML = h || 'Nenhum recibo encontrado.';
    }

    window.baixarPdfVale = async (id) => {
        const v = window.cache_recibos[id];
        document.getElementById('pdf-header-tipo').innerText = "RECIBO DE PAGAMENTO";
        document.getElementById('pdf-texto-principal').innerText = v.texto;
        document.getElementById('pdf-img-assinatura').src = v.assinatura;
        document.getElementById('pdf-nome-func').innerText = v.nome;
        document.getElementById('pdf-bloco-assinatura').style.display = 'block';
        document.getElementById('pdf-tabela-ponto').style.display = 'none';

        Swal.fire({title: 'Gerando...', allowOutsideClick: false}); Swal.showLoading();
        const canvas = await html2canvas(document.getElementById('area-export-pdf'), { scale: 2 });
        const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
        pdf.addImage(canvas.toDataURL('image/jpeg'), 'JPEG', 0, 0, 210, (canvas.height * 210) / canvas.width);
        pdf.save(`Recibo_${v.nome}.pdf`);
        Swal.fire('OK!', 'Documento baixado.', 'success');
    };

    async function acaoBuscarPonto() {
        const id = document.getElementById('pt-select-func').value;
        const snap = await getDocs(query(collection(db, "ponto_registros"), where("fId", "==", id)));
        let h = ''; window.cache_pontos = [];
        snap.forEach(d => {
            const p = d.data(); window.cache_pontos.push(p);
            h += `<div class="card-resultado" style="border-left-color:${p.tipo=='Entrada'?'green':'red'}"><b>${p.tipo}</b> - ${p.data} ${p.hora}<br>Local: ${p.obra}<br><button class="btn btn-azul" style="background:#4285F4; padding:5px; font-size:11px;" onclick="window.open('http://googleusercontent.com/maps.google.com/9{p.lat},${p.lng}')">📍 VER NO MAPA</button></div>`;
        });
        document.getElementById('lista-ponto-corpo').innerHTML = h || 'Sem registros.';
        document.getElementById('btn-gerar-relatorio-ponto').style.display = snap.empty ? 'none' : 'block';
    }

    async function acaoPdfPontoMensal() {
        const f = window.cache_f[document.getElementById('pt-select-func').value];
        document.getElementById('pdf-header-tipo').innerText = "FOLHA DE PONTO MENSAL";
        document.getElementById('pdf-texto-principal').innerHTML = `<b>FUNCIONÁRIO:</b> ${f.nome}<br><b>CPF:</b> ${f.cpf}`;
        document.getElementById('pdf-bloco-assinatura').style.display = 'none';
        document.getElementById('pdf-tabela-ponto').style.display = 'table';
        
        let trs = '';
        window.cache_pontos.sort((a,b)=>b.ts - a.ts).forEach(p => {
            trs += `<tr><td style="padding:8px; border:1px solid #ddd;">${p.data}</td><td style="padding:8px; border:1px solid #ddd;">${p.hora}</td><td style="padding:8px; border:1px solid #ddd;">${p.tipo}</td><td style="padding:8px; border:1px solid #ddd;">${p.obra}</td></tr>`;
        });
        document.getElementById('pdf-corpo-tabela').innerHTML = trs;

        const canvas = await html2canvas(document.getElementById('area-export-pdf'), { scale: 2 });
        const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
        pdf.addImage(canvas.toDataURL('image/jpeg'), 'JPEG', 0, 0, 210, (canvas.height * 210) / canvas.width);
        pdf.save(`Folha_Ponto_${f.nome}.pdf`);
    }

    // --- FUNÇÕES DO FUNCIONÁRIO ---

    async function acaoLoginFunc() {
        const c = document.getElementById('log-cpf').value;
        const s = document.getElementById('log-senha').value;
        const q = query(collection(db, "funcionarios"), where("cpf", "==", c));
        const snap = await getDocs(q);
        
        if(snap.empty) return Swal.fire('Erro', 'CPF não encontrado.', 'error');
        const d = snap.docs; const f = d.data();
        if(!f.senha) {
            await updateDoc(doc(db, "funcionarios", d.id), { senha: s });
            logarSessao(d.id, f.nome);
        } else if(f.senha === s) { logarSessao(d.id, f.nome); }
        else { Swal.fire('Erro', 'Senha incorreta.', 'error'); }
    }
    function logarSessao(id, nome) { localStorage.setItem('fId', id); localStorage.setItem('fNome', nome); location.reload(); }

    async function acaoPonto(tipo) {
        const obra = document.getElementById('ponto-obra').value.trim();
        if(!obra) return Swal.fire('Atenção', 'Digite o nome da obra!', 'warning');
        Swal.fire({title: 'Localizando...', allowOutsideClick: false}); Swal.showLoading();

        navigator.geolocation.getCurrentPosition(async (pos) => {
            await addDoc(collection(db, "ponto_registros"), {
                fId: localStorage.getItem('fId'), nome: localStorage.getItem('fNome'),
                tipo: tipo, obra: obra, lat: pos.coords.latitude, lng: pos.coords.longitude,
                data: new Date().toLocaleDateString('pt-BR'), hora: new Date().toLocaleTimeString('pt-BR'), ts: Date.now()
            });
            Swal.fire('Sucesso!', tipo + ' registrada.', 'success');
            document.getElementById('ponto-obra').value = '';
        }, () => Swal.fire('Erro GPS', 'Ligue o GPS do celular.', 'error'), {enableHighAccuracy: true});
    }

    // --- ASSINATURA ---
    const cv = document.getElementById('pincel-assinatura');
    const ctx = cv?.getContext('2d');
    let desenhando = false;
    if(cv) {
        cv.width = cv.offsetWidth; cv.height = cv.offsetHeight;
        const getP = (e) => { const r = cv.getBoundingClientRect(); return { x: (e.touches ? e.touches.clientX : e.clientX) - r.left, y: (e.touches ? e.touches.clientY : e.clientY) - r.top }};
        cv.onmousedown = cv.ontouchstart = (e) => { desenhando = true; ctx.beginPath(); const p = getP(e); ctx.moveTo(p.x, p.y); ctx.lineWidth=2.5; ctx.strokeStyle="#1a2a43"; };
        cv.onmousemove = cv.ontouchmove = (e) => { if(!desenhando) return; const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
        window.onmouseup = window.ontouchend = () => desenhando = false;
    }

    async function loadRecibo(id) {
        const d = await getDoc(doc(db, "vales_sistema", id));
        if(d.exists()) {
            if(d.data().status === 'assinado') { document.body.innerHTML = "<h2 style='text-align:center; margin-top:100px;'>Recibo já assinado.</h2>"; return; }
            document.getElementById('recibo-texto-corpo').innerText = d.data().texto;
        }
    }

    async function acaoAssinarFinal() {
        Swal.fire({title: 'Enviando...', allowOutsideClick: false}); Swal.showLoading();
        await updateDoc(doc(db, "vales_sistema", v_id), { assinatura: cv.toDataURL(), status: "assinado" });
        Swal.fire('Sucesso!', 'Assinatura enviada.', 'success').then(() => location.href = "https://google.com");
    }

    window.deletarFunc = async (id) => { if(confirm('Excluir funcionário?')) { await deleteDoc(doc(db, "funcionarios", id)); carregarDadosPatrao(); } };
</script>
</body>
</html>
