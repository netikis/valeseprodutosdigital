<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FH Construções - Vales</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --azul-fh: #1a3a5a; --cinza-fundo: #f4f7f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--cinza-fundo); margin: 0; padding: 15px; color: #333; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: auto; border-top: 8px solid var(--azul-fh); }
        
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-img { max-width: 180px; height: auto; margin-bottom: 10px; }
        .title-top { color: var(--azul-fh); font-weight: 800; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; }

        label { display: block; margin-top: 15px; font-weight: bold; font-size: 13px; color: #555; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }

        #area-recibo { border: 1px solid #eee; padding: 20px; border-radius: 12px; margin-top: 25px; background: #fff; }
        .recibo-header { text-align: center; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; font-size: 16px; color: #000; }
        
        canvas { border: 1px solid #f0f0f0; background: #fafafa; width: 100%; height: 150px; border-radius: 8px; touch-action: none; margin-top: 10px; }
        .btn-limpar { background: none; border: none; color: #d9534f; font-size: 11px; cursor: pointer; margin-top: 5px; display: block; width: 100%; text-align: center; }

        .btn-enviar { background: var(--azul-fh); color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; margin-top: 25px; cursor: pointer; }
        
        .config-btn { text-align: center; margin-top: 20px; font-size: 11px; color: #ccc; cursor: pointer; text-decoration: none; display: block; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <img src="logo.jpg" alt="FH Construções" class="logo-img">
        <div class="title-top">RECIBO DIGITAL DE VALES</div>
    </div>

    <label>Nome do Funcionário</label>
    <input type="text" id="nome" placeholder="Digite o nome">

    <label>Valor (R$)</label>
    <input type="number" id="valor" placeholder="0,00">

    <div id="area-recibo">
        <div class="recibo-header">RECIBO</div>
        <div style="font-size: 15px; line-height: 1.6;">
            Eu, <b id="res-nome">__________</b>, recebi da empresa <b>FH Construções</b> o valor de <b>R$ <span id="res-valor">0,00</span></b>.
        </div>
        
        <p style="font-size: 12px; color: #888; text-align: center; margin-top: 25px; margin-bottom: 5px;">Assinatura:</p>
        <canvas id="signature-pad"></canvas>
        <button class="btn-limpar" onclick="limpar()">Limpar Assinatura</button>
    </div>

    <button class="btn-enviar" id="btnFinalizar">ENVIAR PARA WHATSAPP</button>
    
    <a class="config-btn" onclick="configurar()">⚙️ Configurações de Telefone</a>
</div>

<script>
    const n = document.getElementById('nome');
    const v = document.getElementById('valor');
    n.oninput = () => document.getElementById('res-nome').innerText = n.value || '__________';
    v.oninput = () => document.getElementById('res-valor').innerText = v.value || '0,00';

    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    // Ajuste de resolução do canvas
    function resize() {
        const ratio = window.devicePixelRatio || 1;
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        ctx.scale(ratio, ratio);
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#1a3a5a";
    }
    window.onload = resize;

    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    };

    const start = (e) => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
    const move = (e) => { if(!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
    const stop = () => drawing = false;

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start, {passive: false});
    canvas.addEventListener('touchmove', move, {passive: false});
    window.addEventListener('touchend', stop);

    function limpar() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function configurar() {
        Swal.fire({
            title: 'Número do WhatsApp',
            input: 'text',
            inputLabel: 'Digite o número com DDD (ex: 43996408964)',
            inputValue: localStorage.getItem('tel_fh') || '43996408964',
            showCancelButton: true
        }).then((result) => {
            if (result.isConfirmed) {
                localStorage.setItem('tel_fh', result.value.replace(/\D/g, ''));
                Swal.fire('Salvo!', '', 'success');
            }
        });
    }

    document.getElementById('btnFinalizar').onclick = function() {
        if(!n.value || !v.value) return Swal.fire('Atenção', 'Preencha o nome e o valor!', 'warning');
        
        const tel = localStorage.getItem('tel_fh') || "43996408964";
        const msg = `*FH Construções*\n*Recibo de Vale*\n\n*Funcionário:* ${n.value}\n*Valor:* R$ ${v.value}`;
        
        window.location.href = `https://api.whatsapp.com/send?phone=55${tel}&text=${encodeURIComponent(msg)}`;
    };
</script>

</body>
</html>
