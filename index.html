<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Recibo de Vales Digital</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        .logo { font-weight: bold; color: #1565c0; font-size: 22px; margin-bottom: 20px; text-align: center; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        #area-recibo { background: white; padding: 15px; border: 1px solid #eee; margin-top: 20px; border-radius: 8px; }
        .header-recibo { text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        #signature-pad { border: 2px dashed #999; border-radius: 5px; background: #fafafa; cursor: crosshair; touch-action: none; width: 100%; height: 180px; }
        .btn-enviar { background: #25D366; color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 20px; cursor: pointer; }
        .btn-limpar { background: #f44336; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-size: 12px; margin-top: 8px; cursor: pointer; }
        
        /* Estilo para a engrenagem de configuração */
        .config-section { margin-top: 20px; padding-top: 15px; border-top: 1px dashed #ccc; font-size: 12px; color: #666; }
        .config-input { padding: 5px; font-size: 12px; width: auto; display: inline-block; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">SISTEMA DE VALES</div>
    
    <div id="form-dados">
        <label>Nome do Funcionário:</label>
        <input type="text" id="nome" placeholder="Nome completo">

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Valor (R$):</label>
                <input type="number" id="valor" placeholder="0,00">
            </div>
            <div style="flex: 1;">
                <label>Tipo:</label>
                <select id="tipo">
                    <option value="VALE EM DINHEIRO">Vale Dinheiro</option>
                    <option value="PRODUTO">Produto</option>
                </select>
            </div>
        </div>

        <label>Descrição:</label>
        <textarea id="desc" rows="2" placeholder="Ex: Adiantamento quinzena"></textarea>
    </div>

    <div id="area-recibo">
        <div class="header-recibo">
            <h3 style="margin:0">RECIBO DE VALE</h3>
            <span id="data-hora" style="font-size: 12px; color: #666;"></span>
        </div>
        
        <div style="font-size: 15px; line-height: 1.5; text-align: justify;">
            Eu, <b id="resumo-nome">...</b>, declaro ter recebido a importância de 
            <b>R$ <span id="resumo-valor">0,00</span></b> referente a 
            <span id="resumo-desc">...</span>.
        </div>

        <label style="margin-top: 20px; text-align: center; border-top: 1px solid #eee; padding-top: 10px;">Assinatura do Funcionário:</label>
        <canvas id="signature-pad"></canvas>
    </div>

    <div style="text-align: right;">
        <button class="btn-limpar" id="limparBtn">Limpar Assinatura</button>
    </div>

    <button class="btn-enviar" id="btnFinalizar">SALVAR E ENVIAR WHATSAPP</button>

    <div class="config-section">
        <details>
            <summary>⚙️ Configurar número do WhatsApp</summary>
            <p>Digite o número (com DDD) para onde os vales serão enviados:</p>
            <input type="text" id="inputNumPatrao" class="config-input" placeholder="Ex: 43996408964">
            <button onclick="salvarNumero()" style="padding: 5px 10px; cursor: pointer;">Salvar</button>
        </details>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBKlQXW4JRrPxv_NcoG8Jq2-7KZZALrTuU",
        authDomain: "fhconstrucoes-f36d0.firebaseapp.com",
        projectId: "fhconstrucoes-f36d0",
        storageBucket: "fhconstrucoes-f36d0.firebasestorage.app",
        messagingSenderId: "621427159155",
        appId: "1:621427159155:web:85a4975d35a24513d6ba06"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- Lógica do LocalStorage ---
    const inputConfig = document.getElementById('inputNumPatrao');
    
    // Carregar número salvo ao abrir a página
    window.addEventListener('load', () => {
        const salvo = localStorage.getItem('numero_whatsapp');
        if (salvo) {
            inputConfig.value = salvo;
        } else {
            // Valor padrão caso nunca tenha sido salvo
            inputConfig.value = "43996408964";
        }
        resizeCanvas();
    });

    // Função global para salvar (chamada pelo botão)
    window.salvarNumero = () => {
        const num = inputConfig.value.replace(/\D/g, ''); // Remove parênteses e traços
        localStorage.setItem('numero_whatsapp', num);
        Swal.fire('Salvo!', 'O número destino foi atualizado.', 'success');
    };

    // --- Restante da Lógica (Assinatura e Envio) ---
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function resizeCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        ctx.lineWidth = 3;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#000";
    }

    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    };

    const start = (e) => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
    const move = (e) => { if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
    const stop = () => drawing = false;

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); }, { passive: false });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); }, { passive: false });
    canvas.addEventListener('touchend', stop);

    document.getElementById('limparBtn').onclick = () => ctx.clearRect(0, 0, canvas.width, canvas.height);

    const atualizar = () => {
        document.getElementById('resumo-nome').innerText = document.getElementById('nome').value || '...';
        document.getElementById('resumo-valor').innerText = document.getElementById('valor').value || '0,00';
        document.getElementById('resumo-desc').innerText = document.getElementById('desc').value || '...';
        document.getElementById('data-hora').innerText = new Date().toLocaleString('pt-BR');
    };
    document.querySelectorAll('input, textarea, select').forEach(el => el.addEventListener('input', atualizar));
    atualizar();

    document.getElementById('btnFinalizar').onclick = async () => {
        const nome = document.getElementById('nome').value;
        const valor = document.getElementById('valor').value;
        
        // Pega o número que está salvo no LocalStorage
        let numDestino = localStorage.getItem('numero_whatsapp') || "43996408964";
        if (!numDestino.startsWith('55')) numDestino = '55' + numDestino;

        if(!nome || !valor) return Swal.fire('Erro', 'Preencha o nome e o valor!', 'error');

        const btn = document.getElementById('btnFinalizar');
        btn.innerText = "Processando...";
        btn.disabled = true;

        try {
            const canvasImg = await html2canvas(document.getElementById('area-recibo'), { backgroundColor: "#ffffff" });
            const imagemBase64 = canvasImg.toDataURL("image/png");

            await addDoc(collection(db, "vales_assinados"), {
                funcionario: nome,
                valor: valor,
                tipo: document.getElementById('tipo').value,
                descricao: document.getElementById('desc').value,
                assinatura: imagemBase64,
                data: serverTimestamp()
            });

            const msg = `*NOVO VALE GERADO*\n\n*Funcionario:* ${nome}\n*Valor:* R$ ${valor}\n\nO recibo foi salvo no sistema.`;
            
            Swal.fire('Sucesso!', 'Vale registrado!', 'success').then(() => {
                window.location.href = `https://api.whatsapp.com/send?phone=${numDestino}&text=${encodeURIComponent(msg)}`;
            });
        } catch (e) {
            console.error(e);
            Swal.fire('Erro', 'Falha ao salvar.', 'error');
            btn.disabled = false;
            btn.innerText = "SALVAR E ENVIAR WHATSAPP";
        }
    };
</script>
</body>
</html>
