<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FH Construções - Vales</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --azul: #1a3a5a; --fundo: #f4f7f9; }
        body { font-family: sans-serif; background: var(--fundo); margin: 0; padding: 10px; }
        .card { background: white; padding: 20px; border-radius: 15px; max-width: 450px; margin: auto; border-top: 6px solid var(--azul); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .logo-container { text-align: center; margin-bottom: 15px; }
        .logo-img { max-width: 180px; height: auto; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        #area-recibo { border: 1px solid #ddd; padding: 15px; border-radius: 10px; background: #fff; }
        canvas { border: 1px solid #eee; background: #fafafa; width: 100%; height: 150px; border-radius: 5px; }
        .btn-enviar { background: var(--azul); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <img src="logo.jpg" alt="FH Construções" class="logo-img">
        <div style="font-weight: bold; color: var(--azul); margin-top: 5px;">RECIBO DIGITAL DE VALES</div>
    </div>

    <label>Nome do Funcionário</label>
    <input type="text" id="nome" placeholder="Digite o nome">

    <label>Valor (R$)</label>
    <input type="number" id="valor" placeholder="0,00">

    <div id="area-recibo">
        <p style="text-align: center; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px;">RECIBO</p>
        <p style="font-size: 14px;">Eu, <span id="res-nome">...</span>, recebi da <b>FH Construções</b> o valor de <b>R$ <span id="res-valor">0,00</span></b>.</p>
        <p style="font-size: 12px; color: #666; text-align: center;">Assinatura:</p>
        <canvas id="signature-pad"></canvas>
        <button onclick="limpar()" style="font-size: 10px; background: none; border: none; color: red; cursor: pointer;">Limpar Assinatura</button>
    </div>

    <button class="btn-enviar" id="btnFinalizar" style="margin-top: 20px;">ENVIAR PARA WHATSAPP</button>
    
    <div style="margin-top: 20px; font-size: 10px; color: #ccc; text-align: center;">
        <details>
            <summary>Configurações</summary>
            <input type="text" id="numPatrao" value="43996408964">
            <button onclick="localStorage.setItem('tel', document.getElementById('numPatrao').value)">Salvar Tel</button>
        </details>
    </div>
</div>

<script>
    // Lógica simples de preenchimento
    const n = document.getElementById('nome');
    const v = document.getElementById('valor');
    n.oninput = () => document.getElementById('res-nome').innerText = n.value;
    v.oninput = () => document.getElementById('res-valor').innerText = v.value;

    // Assinatura
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let desenhando = false;

    canvas.addEventListener('mousedown', () => desenhando = true);
    window.addEventListener('mouseup', () => desenhando = false);
    canvas.addEventListener('mousemove', (e) => {
        if (!desenhando) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineWidth = 2;
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();
    });
    
    // Toque no celular
    canvas.addEventListener('touchstart', (e) => { desenhando = true; ctx.beginPath(); });
    canvas.addEventListener('touchmove', (e) => {
        if (!desenhando) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
        ctx.stroke();
    });

    function limpar() { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.beginPath(); }

    document.getElementById('btnFinalizar').onclick = function() {
        const tel = localStorage.getItem('tel') || "43996408964";
        const msg = `*FH Construções*\nNovo Vale: ${n.value}\nValor: R$ ${v.value}`;
        window.location.href = `https://api.whatsapp.com/send?phone=55${tel}&text=${encodeURIComponent(msg)}`;
    };
</script>

</body>
</html>
