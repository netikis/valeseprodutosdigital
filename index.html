<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script>
        const _params = new URLSearchParams(window.location.search);
        let _appName = "Gestão RH"; 
        if (_params.get('ponto')) _appName = "FH Ponto"; 
        if (_params.get('id')) _appName = "Assinar Vale"; 
        document.write('<title>' + _appName + '</title>');
        document.write('<meta name="apple-mobile-web-app-title" content="' + _appName + '">');
    </script>
    
    <link rel="icon" href="https://i.postimg.cc/zDRJMSTn/69420f5a-5b80-457e-8146-00485162d7f2.jpg">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/zDRJMSTn/69420f5a-5b80-457e-8146-00485162d7f2.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --dark-navy: #1a2a43; --gold: #d4a017; --light-bg: #f4f7f6; --white: #ffffff; --text-color: #333333; }
        body { font-family: 'Poppins', sans-serif; background: var(--light-bg); margin: 0; padding: 15px; color: var(--text-color); }
        .main-card { background: var(--white); padding: 30px 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(26, 42, 67, 0.1); max-width: 480px; margin: auto; border-top: 6px solid var(--dark-navy); }
        .header-logo { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .logo-img { max-width: 160px; height: auto; margin-bottom: 5px; border-radius: 10px; }
        .title-top { color: var(--dark-navy); font-weight: 700; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 13px; color: var(--dark-navy); text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 2px solid #e0e6ed; border-radius: 10px; box-sizing: border-box; font-size: 15px; font-family: 'Poppins', sans-serif; }
        .btn-enviar { background: var(--dark-navy); color: var(--white); border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 700; font-size: 15px; margin-top: 25px; cursor: pointer; }
        .btn-gold { background: var(--gold); color: var(--dark-navy); border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 700; font-size: 15px; margin-top: 20px; cursor: pointer; }
        .btn-entrada { background: #28a745; color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; margin-top: 15px; }
        .btn-saida { background: #d9534f; color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; margin-top: 15px; }
        .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 25px; font-size: 11px; }
        .tab { flex: 1; text-align: center; padding: 10px 2px; cursor: pointer; font-weight: 600; color: #aaa; }
        .tab.active { color: var(--dark-navy); border-bottom: 3px solid var(--gold); }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .resultado-item { border: 1px solid #e0e6ed; padding: 15px; border-radius: 10px; margin-top: 10px; background: #fff; border-left: 4px solid var(--gold); }
        .btn-maps { background: #4285F4; color: white; border: none; padding: 8px; border-radius: 5px; width: 100%; margin-top: 10px; font-weight: bold; }
        .func-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        canvas { border: 2px solid #e0e6ed; background: var(--white); width: 100%; height: 160px; border-radius: 10px; touch-action: none; margin-top: 15px; }
    </style>
</head>
<body>

<div class="main-card" id="tela-patrao" style="display: none;">
    <div class="header-logo"><img src="https://i.postimg.cc/zDRJMSTn/69420f5a-5b80-457e-8146-00485162d7f2.jpg" class="logo-img"><div class="title-top">Gestão FH</div></div>
    <div class="tabs">
        <div class="tab active" onclick="mudarAba('cadastrar')">EQUIPE</div>
        <div class="tab" onclick="mudarAba('criar')">VALES</div>
        <div class="tab" onclick="mudarAba('ponto')">PONTO GPS</div>
    </div>
    <div id="aba-cadastrar" class="view-section active">
        <label>Nome</label><input type="text" id="c-nome">
        <label>CPF (Apenas números)</label><input type="number" id="c-cpf">
        <label>WhatsApp</label><input type="number" id="c-tel">
        <button class="btn-gold" id="btnCadastrarFunc">SALVAR</button>
        <div id="lista-equipe" style="margin-top:20px;">Carregando...</div>
    </div>
    <div id="aba-criar" class="view-section">
        <label>Funcionário</label><select id="p-select" class="lista-funcs"></select>
        <label>Valor R$</label><input type="number" id="p-valor">
        <label>Descrição</label><textarea id="p-desc"></textarea>
        <button class="btn-enviar" id="btnGerarVale">ENVIAR VALE</button>
    </div>
    <div id="aba-ponto" class="view-section">
        <button class="btn-gold" id="btnCopiaLink">COPIAR LINK DO PONTO</button>
        <label>Histórico de:</label>
        <select id="pt-select" class="lista-funcs"></select>
        <button onclick="buscarPonto()" class="btn-enviar">VER REGISTROS</button>
        <div id="lista-ponto"></div>
    </div>
</div>

<div class="main-card" id="tela-login" style="display: none;">
    <div class="header-logo"><img src="https://i.postimg.cc/zDRJMSTn/69420f5a-5b80-457e-8146-00485162d7f2.jpg" class="logo-img"></div>
    <label>Seu CPF</label><input type="number" id="l-cpf">
    <label>Sua Senha</label><input type="password" id="l-senha" placeholder="Crie uma agora">
    <button class="btn-enviar" id="btnLogin">ENTRAR</button>
</div>

<div class="main-card" id="tela-relogio" style="display: none;">
    <div class="header-logo"><div class="title-top">Olá, <span id="n-logado"></span></div></div>
    <label>Em qual obra você está?</label><input type="text" id="obra" placeholder="Ex: Obra Centro">
    <button class="btn-entrada" onclick="registrarPonto('Entrada')">🟢 ENTRADA</button>
    <button class="btn-saida" onclick="registrarPonto('Saída')">🔴 SAÍDA</button>
    <button onclick="localStorage.clear(); location.reload();" style="width:100%; border:none; background:none; color:#999; margin-top:20px; font-size:11px;">Sair da conta</button>
</div>

<div class="main-card" id="tela-vale" style="display: none;">
    <div class="header-logo"><div class="title-top">Assinatura Digital</div></div>
    <div id="v-texto" style="font-size:14px; margin-bottom:15px;">Carregando...</div>
    <canvas id="signature-pad"></canvas>
    <button class="btn-gold" id="btnAssinar">CONFIRMAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, deleteDoc, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBKlQXW4JRrPxv_NcoG8Jq2-7KZZALrTuU",
        authDomain: "fhconstrucoes-f36d0.firebaseapp.com",
        projectId: "fhconstrucoes-f36d0",
        storageBucket: "fhconstrucoes-f36d0.firebasestorage.app",
        messagingSenderId: "621427159155",
        appId: "1:621427159155:web:85a4975d35a24513d6ba06"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const params = new URLSearchParams(window.location.search);
    const vId = params.get('id');
    const isPonto = params.get('ponto');

    // INICIALIZAÇÃO
    if(vId) { document.getElementById('tela-vale').style.display = 'block'; carregarVale(vId); }
    else if(isPonto) {
        if(localStorage.getItem('fId')) { 
            document.getElementById('tela-relogio').style.display = 'block'; 
            document.getElementById('n-logado').innerText = localStorage.getItem('fNome');
        } else { document.getElementById('tela-login').style.display = 'block'; }
    } else { document.getElementById('tela-patrao').style.display = 'block'; carregarEquipe(); }

    // LOGIN BLINDADO (REVISADO)
    document.getElementById('btnLogin').onclick = async function() {
        const cpf = document.getElementById('l-cpf').value.trim();
        const senha = document.getElementById('l-senha').value.trim();
        if(!cpf || !senha) return Swal.fire('Erro', 'Preencha tudo', 'error');

        Swal.fire({title: 'Entrando...', allowOutsideClick: false}); Swal.showLoading();

        try {
            const q = query(collection(db, "funcionarios"), where("cpf", "==", cpf));
            const snap = await getDocs(q);

            if(snap.empty) return Swal.fire('Erro', 'CPF não cadastrado.', 'error');

            // Usando forEach para evitar erro de undefined no docs
            snap.forEach(async (d) => {
                const dados = d.data();
                if(!dados.senha) {
                    await updateDoc(doc(db, "funcionarios", d.id), {senha: senha});
                    logar(d.id, dados.nome);
                } else if(dados.senha === senha) {
                    logar(d.id, dados.nome);
                } else {
                    Swal.fire('Erro', 'Senha incorreta', 'error');
                }
            });
        } catch(e) { Swal.fire('Erro', 'Falha na conexão com banco.', 'error'); }
    };

    function logar(id, nome) {
        localStorage.setItem('fId', id); localStorage.setItem('fNome', nome);
        location.reload();
    }

    // PONTO GPS
    window.registrarPonto = function(tipo) {
        const o = document.getElementById('obra').value;
        if(!o) return Swal.fire('Atenção', 'Diga a obra!', 'warning');
        Swal.fire({title: 'Pegando GPS...', allowOutsideClick: false}); Swal.showLoading();

        navigator.geolocation.getCurrentPosition(async (p) => {
            await addDoc(collection(db, "ponto_registros"), {
                fId: localStorage.getItem('fId'), nome: localStorage.getItem('fNome'),
                tipo: tipo, obra: o, lat: p.coords.latitude, lng: p.coords.longitude,
                data: new Date().toLocaleDateString('pt-BR'), hora: new Date().toLocaleTimeString('pt-BR'),
                ts: Date.now()
            });
            Swal.fire('OK!', 'Ponto batido.', 'success');
        }, () => Swal.fire('Erro', 'Ligue o GPS.', 'error'), {enableHighAccuracy: true});
    };

    // FUNÇÕES PATRÃO
    window.mudarAba = (aba) => {
        document.querySelectorAll('.tab, .view-section').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active'); document.getElementById('aba-'+aba).classList.add('active');
    };

    async function carregarEquipe() {
        const snap = await getDocs(query(collection(db, "funcionarios"), orderBy("nome")));
        let h = ''; let opts = '<option value="">Selecione...</option>';
        window.equipe = {};
        snap.forEach(d => {
            const f = d.data(); window.equipe[d.id] = f;
            opts += `<option value="${d.id}">${f.nome}</option>`;
            h += `<div class="func-item"><span>${f.nome} (CPF: ${f.cpf})</span><button onclick="apagarF('${d.id}')" style="background:red; color:white; border:none; padding:5px; border-radius:5px;">X</button></div>`;
        });
        document.getElementById('lista-equipe').innerHTML = h;
        document.querySelectorAll('.lista-funcs').forEach(s => s.innerHTML = opts);
    }

    document.getElementById('btnCadastrarFunc').onclick = async () => {
        const n = document.getElementById('c-nome').value;
        const c = document.getElementById('c-cpf').value;
        const t = document.getElementById('c-tel').value;
        await addDoc(collection(db, "funcionarios"), {nome: n, cpf: c, tel: t, senha: ""});
        Swal.fire('Salvo!', '', 'success'); carregarEquipe();
    };

    document.getElementById('btnGerarVale').onclick = async () => {
        const id = document.getElementById('p-select').value;
        const v = document.getElementById('p-valor').value;
        const d = await addDoc(collection(db, "vales_sistema"), {fId: id, nome: window.equipe[id].nome, valor: v, texto: `Eu, ${window.equipe[id].nome}, recebi R$ ${v} da FH Construções.`, status: "pendente"});
        const link = window.location.origin + window.location.pathname + "?id=" + d.id;
        window.open(`https://api.whatsapp.com/send?phone=55${window.equipe[id].tel}&text=Assine seu Vale: ${link}`);
    };

    document.getElementById('btnCopiaLink').onclick = () => {
        navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?ponto=true");
        Swal.fire('Copiado!', 'Mande para os funcionários.', 'success');
    };

    window.buscarPonto = async () => {
        const id = document.getElementById('pt-select').value;
        const snap = await getDocs(query(collection(db, "ponto_registros"), where("fId", "==", id)));
        let h = '';
        snap.forEach(d => {
            const p = d.data();
            h += `<div class="resultado-item"><b>${p.tipo}</b> - ${p.data} às ${p.hora}<br>Local: ${p.obra}<br><button class="btn-maps" onclick="window.open('https://www.google.com/maps?q=${p.lat},${p.lng}')">📍 MAPA</button></div>`;
        });
        document.getElementById('lista-ponto').innerHTML = h || 'Sem registros.';
    };

    // ASSINATURA
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas?.getContext('2d');
    let dsn = false;
    if(canvas) {
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        const getP = (e) => { const r = canvas.getBoundingClientRect(); return { x: (e.touches ? e.touches.clientX : e.clientX) - r.left, y: (e.touches ? e.touches.clientY : e.clientY) - r.top }};
        canvas.onmousedown = canvas.ontouchstart = (e) => { dsn = true; ctx.beginPath(); const p = getP(e); ctx.moveTo(p.x, p.y); };
        canvas.onmousemove = canvas.ontouchmove = (e) => { if(!dsn) return; const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
        window.onmouseup = window.ontouchend = () => dsn = false;
    }

    async function carregarVale(id) {
        const d = await getDoc(doc(db, "vales_sistema", id));
        if(d.exists()) document.getElementById('v-texto').innerText = d.data().texto;
    }

    document.getElementById('btnAssinar').onclick = async () => {
        await updateDoc(doc(db, "vales_sistema", vId), {assinatura: canvas.toDataURL(), status: "assinado"});
        Swal.fire('OK', 'Assinado!', 'success').then(() => document.body.innerHTML = "<h2>Concluído!</h2>");
    };

    window.apagarF = async (id) => { if(confirm('Excluir?')) { await deleteDoc(doc(db, "funcionarios", id)); carregarEquipe(); } };
</script>
</body>
</html>
