<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FH Construções - Vales e Produtos</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --azul-fh: #1a3a5a; --cinza-fundo: #f4f7f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--cinza-fundo); margin: 0; padding: 15px; color: #333; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: auto; border-top: 8px solid var(--azul-fh); }
        
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-img { max-width: 180px; height: auto; margin-bottom: 10px; }
        .title-top { color: var(--azul-fh); font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }

        label { display: block; margin-top: 12px; font-weight: bold; font-size: 12px; color: #555; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; font-family: inherit; }

        #area-recibo { border: 1px solid #eee; padding: 20px; border-radius: 12px; margin-top: 25px; background: #fff; }
        .recibo-header { text-align: center; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; font-size: 16px; color: #000; }
        .data-recibo { text-align: center; font-size: 11px; color: #888; margin-bottom: 15px; }
        
        #texto-recibo-dinamico { font-size: 14px; line-height: 1.6; text-align: justify; }

        canvas { border: 1px solid #f0f0f0; background: #fafafa; width: 100%; height: 140px; border-radius: 8px; touch-action: none; margin-top: 10px; }
        .btn-limpar { background: none; border: none; color: #d9534f; font-size: 10px; cursor: pointer; margin-top: 5px; display: block; width: 100%; text-align: center; }

        .btn-enviar { background: var(--azul-fh); color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; margin-top: 25px; cursor: pointer; }
        .config-btn { text-align: center; margin-top: 20px; font-size: 11px; color: #ccc; cursor: pointer; text-decoration: none; display: block; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <img src="logo.jpg" alt="FH Construções" class="logo-img">
        <div class="title-top">Recibo Digital de Vales e Produtos</div>
    </div>

    <label>Nome do Funcionário</label>
    <input type="text" id="nome" placeholder="Nome completo">

    <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>Valor (R$)</label>
            <input type="number" id="valor" placeholder="0,00">
        </div>
        <div style="flex: 1;">
            <label>Tipo</label>
            <select id="tipo">
                <option value="Dinheiro">💰 Vale Dinheiro</option>
                <option value="Produto">📦 Produto</option>
            </select>
        </div>
    </div>

    <label>Descrição</label>
    <textarea id="desc" rows="2" placeholder="Ex: Adiantamento da semana / Bota de segurança"></textarea>

    <div id="area-recibo">
        <div id="logo-pdf" style="display: none; text-align: center; margin-bottom: 20px;">
            <img src="logo.jpg" style="max-width: 150px;">
            <div style="font-weight: bold; color: #1a3a5a; font-size: 16px; margin-top: 5px;">FH CONSTRUÇÕES</div>
        </div>

        <div class="recibo-header">RECIBO OFICIAL</div>
        <div class="data-recibo" id="data-atual">--/--/----</div>
        
        <div id="texto-recibo-dinamico">
            Eu, <b>__________</b>, recebi da empresa <b>FH Construções</b> a quantia de <b>R$ 0,00</b>, referente a <b>__________</b>.
        </div>
        
        <p style="font-size: 11px; color: #888; text-align: center; margin-top: 25px; margin-bottom: 5px;">Assinatura do Funcionário:</p>
        <canvas id="signature-pad"></canvas>
        <button class="btn-limpar" id="btnLimparAssinatura" onclick="limpar()">Limpar Assinatura</button>
    </div>

    <button class="btn-enviar" id="btnFinalizar">GERAR PDF E ENVIAR WHATSAPP</button>
    
    <a class="config-btn" onclick="configurar()">⚙️ Configurações</a>
</div>

<script>
    // Data Automática
    const dt = new Date();
    document.getElementById('data-atual').innerText = dt.toLocaleDateString('pt-BR');

    // Função que muda a frase
    function atualizarRecibo() {
        const nome = document.getElementById('nome').value || '__________';
        const valor = document.getElementById('valor').value || '0,00';
        const tipo = document.getElementById('tipo').value;
        const desc = document.getElementById('desc').value || '__________';
        
        const areaTexto = document.getElementById('texto-recibo-dinamico');

        if (tipo === 'Dinheiro') {
            areaTexto.innerHTML = `Eu, <b>${nome}</b>, recebi da empresa <b>FH Construções</b> a quantia de <b>R$ ${valor}</b>, referente a <b>${desc}</b>.`;
        } else {
            areaTexto.innerHTML = `Eu, <b>${nome}</b>, adquiri da empresa <b>FH Construções</b> o seguinte produto: <b>${desc}</b>, no valor total de <b>R$ ${valor}</b>.`;
        }
    }

    const campos = ['nome', 'valor', 'tipo', 'desc'];
    campos.forEach(id => {
        document.getElementById(id).addEventListener('input', atualizarRecibo);
    });

    // Assinatura
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function resize() {
        const ratio = window.devicePixelRatio || 1;
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        ctx.scale(ratio, ratio);
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#1a3a5a";
    }
    window.onload = resize;

    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    };

    const start = (e) => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
    const move = (e) => { if(!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
    const stop = () => drawing = false;

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start, {passive: false});
    canvas.addEventListener('touchmove', move, {passive: false});
    window.addEventListener('touchend', stop);

    function limpar() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function configurar() {
        Swal.fire({
            title: 'Configurar WhatsApp',
            input: 'text',
            inputLabel: 'Número com DDD (ex: 43996408964)',
            inputValue: localStorage.getItem('tel_fh') || '43996408964',
            showCancelButton: true
        }).then((res) => {
            if (res.isConfirmed) {
                localStorage.setItem('tel_fh', res.value.replace(/\D/g, ''));
                Swal.fire('Salvo!', '', 'success');
            }
        });
    }

    // --- LÓGICA DE GERAÇÃO E COMPARTILHAMENTO DO PDF ---
    document.getElementById('btnFinalizar').onclick = async function() {
        const n = document.getElementById('nome').value;
        const v = document.getElementById('valor').value;
        if(!n || !v) return Swal.fire('Atenção', 'Preencha Nome e Valor antes de assinar!', 'warning');
        
        const btn = document.getElementById('btnFinalizar');
        const originalText = btn.innerText;
        btn.innerText = "⏳ GERANDO PDF OFICIAL...";
        btn.disabled = true;

        // Prepara a área para tirar a "foto" limpa
        document.getElementById('logo-pdf').style.display = 'block'; // Mostra logo no PDF
        document.getElementById('btnLimparAssinatura').style.display = 'none'; // Esconde o botão de limpar

        try {
            // 1. Tira o Print da área do Recibo
            const reciboArea = document.getElementById('area-recibo');
            const canvasImg = await html2canvas(reciboArea, { scale: 2, backgroundColor: "#ffffff" });
            const imgData = canvasImg.toDataURL('image/png');

            // 2. Constrói o PDF
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (canvasImg.height * pdfWidth) / canvasImg.width;
            
            pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
            
            // 3. Converte PDF para arquivo para ser compartilhado
            const pdfBlob = pdf.output('blob');
            const nomeArquivo = `Recibo_${n.replace(/\s+/g, '_')}.pdf`;
            const file = new File([pdfBlob], nomeArquivo, { type: "application/pdf" });

            const tel = localStorage.getItem('tel_fh') || "43996408964";
            const tipo = document.getElementById('tipo').value;
            const dataStr = document.getElementById('data-atual').innerText;
            const msg = `*FH Construções*\n*Recibo de ${tipo}*\n\n*Data:* ${dataStr}\n*Funcionário:* ${n}\n*Valor:* R$ ${v}`;

            // 4. Compartilha direto (se estiver no celular)
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({
                    files: [file],
                    title: 'Recibo FH Construções',
                    text: msg
                });
            } else {
                // Se estiver no Computador (Faz o download e abre o WhatsApp)
                pdf.save(nomeArquivo);
                await Swal.fire('PDF Gerado!', 'O PDF foi baixado no seu dispositivo. O WhatsApp será aberto agora, basta anexar o documento na conversa.', 'info');
                window.location.href = `https://api.whatsapp.com/send?phone=55${tel}&text=${encodeURIComponent(msg)}`;
            }

        } catch (erro) {
            console.error(erro);
            Swal.fire('Erro', 'Houve um problema ao gerar o PDF.', 'error');
        } finally {
            // Volta a tela ao normal
            document.getElementById('logo-pdf').style.display = 'none';
            document.getElementById('btnLimparAssinatura').style.display = 'block';
            btn.innerText = originalText;
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
